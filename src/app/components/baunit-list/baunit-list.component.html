<div class="container2">
<table>
  <thead>
    <tr>
      <th>Nom</th>
      <th>Due</th>
      <th>GPS</th>
      <th>Img</th>
      <th>Doc</th>
      <th>Env</th>
    </tr>
  </thead>
  <tbody>
    @for (baunit of sqliteService.baunitList; track baunit) {
      <tr (click) = "editBaunit(baunit.id)">
        <td>{{baunit.nombre}}</td>
        <td>Num dueños</td>
        <td>Num GPS</td>
        <td>Num img</td>
        <td>Num docs</td>
        <td>{{baunit.enviado_servidor | changeBooleanByYesNoPipe:true}}</td>
      </tr>
    }
  </tbody>
</table>
</div>
