  <h2>Datos del predio: {{mode}} {{id}}</h2>
  <form [formGroup]="controlsGroup">
    
    <mat-form-field class="custom-input">
      <input matInput placeholder="Nombre del predio" [formControl]="nombre" name="nombre">
      <mat-error *ngIf="nombre.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Departamento" [formControl]="departamento" name="departamento">
      <mat-error *ngIf="departamento.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Provincia" [formControl]="provincia" name="provincia">
      <mat-error *ngIf="provincia.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Sector del predio predio" [formControl]="sector_predio" name="sector_predio">
      <mat-error *ngIf="sector_predio.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Municipio" [formControl]="municipio" name="municipio">
      <mat-error *ngIf="municipio.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Vereda" [formControl]="vereda" name="vereda">
      <mat-error *ngIf="vereda.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Tipo de predio" [formControl]="tipo" name="tipo">
      <mat-error *ngIf="tipo.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Complemento o descripción adicional" [formControl]="complemento" name="complemento">
      <mat-error *ngIf="complemento.hasError('required')">
        Este campo es obligatorio
      </mat-error>
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Número predial" [formControl]="numero_predial" name="numero_predial">
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Número catastral" [formControl]="numero_catastral" name="numero_catastral">
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Coordenadas: longitud" [formControl]="longitud" name="longitud">
    </mat-form-field>
        
    <mat-form-field class="custom-input">
      <input matInput placeholder="Coordenadas: latitud" [formControl]="latitud" name="latitud">
    </mat-form-field>

    <p>Enviado al servidor {{enviado_servidor}}</p>

    <div class="button-container">
    <button mat-raised-button [disabled]="!controlsGroup.valid (click)="save()">Cuardar</button>
    <button mat-raised-button routerLink="../">Atrás</button>
    </div>
  </form>
</div>
